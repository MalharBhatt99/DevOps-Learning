<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Banking Core</title>
        <link href="./css/output.css" rel="stylesheet">
    </head>
    <body class="bg-gray-100">
                <!-- Header -->
        <section class="w-full h-20 bg-[rgb(16,63,184)] px-6">
            <header class="flex items-center justify-between h-full">
                <h1 class="text-xl font-bold text-white font-sans">Banking Core</h1>
                <a href="register.html">
                    <button class="rounded-full font-semibold text-sm text-black bg-white px-4 py-2 hover:bg-black hover:text-white transition">Register Account</button>
                </a>
            </header>
        </section>
                <!-- Login Section -->
        <section class="flex items-center justify-center min-h-[calc(100vh-80px)]">
            <div class="bg-white p-8 rounded-lg shadow-lg w-96">
                <h2 class="text-2xl font-bold mb-6 text-center text-blue-900">Login Page</h2>
                <form class="flex flex-col gap-4 font-semibold" id="loginform" onsubmit="login(event)">
                    <label>Account Number</label>
                    <input type="number" placeholder="Enter Account Number" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500" id="account_number">
                    <label>PIN Number</label>
                    <input type="password" placeholder="Enter PIN Number" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500" id="pin_number">
                    <button type="submit" class="bg-[rgb(16,63,184)] text-white py-2 rounded hover:bg-blue-700 transition">Login</button>
                </form>
            </div>
        </section>
        <script src="js/login.js"></script>
    </body>
</html>
