<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Register Account</title>
        <link href="./css/output.css" rel="stylesheet">
    </head>
    <body class="bg-gray-100 flex items-center justify-center min-h-screen">
        <div class="bg-white shadow-lg rounded-lg p-8 w-96">
            <h2 class="text-2xl font-bold text-center mb-6 text-blue-900">Create New Account</h2>
            <form class="flex flex-col gap-4">
                <label class="font-semibold">Full Name</label>
                <input type="text" id="name" class="border p-2 rounded w-full" placeholder="Enter your name">
                <label class="font-semibold">PIN</label>
                <input type="password" id="pin" class="border p-2 rounded w-full" placeholder="Enter PIN">
                <label class="font-semibold">Initial Deposit</label>
                <input type="number" id="deposit" class="border p-2 rounded w-full" placeholder="Enter amount">
                <button type="button" onclick="registerAccount()" class="bg-blue-900 text-white py-2 rounded hover:bg-blue-700 transition">Create Account</button>
            </form>
            <p class="text-sm text-center mt-4">Already have an account?
                <a href="./index.html" class="text-blue-700 font-semibold">Login</a>
            </p>
        </div>
        <script src="./js/register.js"></script>
    </body>
</html>
