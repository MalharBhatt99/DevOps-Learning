<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Transactions</title>
        <link href="./css/output.css" rel="stylesheet">
    </head>
    <body class="bg-gray-100">
        <div class="flex">
                            <!-- Sidebar -->
            <div class="w-64 bg-blue-900 text-white min-h-screen  p-6">
                <h2 class="text-2xl font-bold mb-8">MyBank</h2>
                <ul class="space-y-4 font-semibold">
                    <li class="hover:text-gray-300 cursor-pointer">
                        <a href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="hover:text-gray-300 cursor-pointer">
                        <a href="transactions.html">Transactions</a>
                    </li>
                    <li class="hover:text-gray-300 cursor-pointer">
                        <button onclick="logout()">Logout</button>
                    </li>
                </ul>
            </div>
                            <!-- Main Content -->
            <div class="flex-1 p-10">
                <h1 class="text-3xl font-bold mb-8">Transaction History</h1>
                <div class="max-h-[80vh] overflow-y-auto flex-1 bg-white shadow rounded-lg">
                    <div class="p-6">
                        <table class="min-w-full text-left border-collapse">
                            <thead class="border-b">
                                <tr class="border-b hover:bg-gray-100">
                                    <th class="p-3 sticky top-0 bg-white z-10">Type</th>
                                    <th class="p-3 sticky top-0 bg-white z-10">Amount</th>
                                    <th class="p-3 sticky top-0 bg-white z-10">Balance After</th>
                                    <th class="p-3 sticky top-0 bg-white z-10">Date</th>
                                </tr>
                            </thead>
                            <tbody id="transaction_table" class="divide-y">
                                <!-- JS will insert rows -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        <script src="./js/api.js"></script>
        <script src="./js/transactions.js"></script> 
    </body>
</html>
