<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking Core</title>
    <link href="./output.css" rel="stylesheet">
</head>
<body>
    <section class="w-full h-25 bg-white p-[1%]">
        <header class="w-full h-full flex">
            <aside class="w-[85%] text-xl font-bold font-sans"><h1>Banking Core</h1></aside>
            <div class="w-[15%]">
                <button class="rounded-full font-semibold text-lg text-white bg-black py-4 px-8 hover:bg-[rgb(16,63,184)] hover:cursor-pointer">Register Account</button>
            </div>
        </header>
    </section>
    <section class="w-full h-full">
        <main class="flex justify-center items-center h-screen pb-[17%]">
            <div class="bg-white p-8 rounded-lg shadow-md w-96">
                <h2 class="text-xl font-bold mb-6 text-center">Login Page</h2>
                <form class="flex flex-col text-base font-semibold gap-4" id="loginform">
                    <label>Account Number :</label>
                    <input type="number" placeholder=" Account Number" class="border p2 rounded" id="account_number">
                    <label>PIN Number :</label>
                    <input type="number" placeholder=" PIN Number" class="border p2 rounded" id="pin_number">
                    <button class="rounded-full font-semibold text-base text-white bg-black p-[3%] hover:bg-[rgb(16,63,184)] hover:cursor-pointer" onclick="login()">Submit</button>
                </form>
            </div>
        </main>
    </section>
    <script src="js/login.js"></script>
</body>
</html>
